---
fetch_live_google_covid_epidemiology_and_hospitalization_data:
  description: |-
    Fetch real COVID-19 epidemiological and hospitalization data from the Google COVID-19 Open Data public GCS endpoints for location key: {location_key} (default: "US" if not provided).

    STEP 1 — FETCH EPIDEMIOLOGY DATA:
    Use the GoogleCovidEpidemiologyTool with:
    - location_key: {location_key}
    - use_latest: false
    - tail_days: 60

    Extract from the response:
    - Date range of available data
    - Total cumulative confirmed cases
    - Total cumulative deaths
    - Total cumulative recoveries
    - Recent 60-day trend in new_confirmed cases (increasing, stable, or decreasing)
    - Recent 60-day trend in new_deceased

    STEP 2 — FETCH HOSPITALIZATION DATA:
    Use the GoogleCovidHospitalizationsTool with:
    - location_key: {location_key}
    - use_latest: false
    - tail_days: 60

    Extract from the response:
    - Latest current_hospitalized_patients (maps to total bed pressure)
    - Latest current_intensive_care_patients (maps to ICU load)
    - Latest current_ventilator_patients (maps to ventilator utilization)
    - Peak values for each of the above over the 60-day window
    - Trend direction for hospitalizations (compare latest vs 30 days prior)

    STEP 3 — SYNTHESIZE:
    Produce a clean contextual summary combining both datasets. Compute:
    - Case fatality rate: cumulative_deceased / cumulative_confirmed x 100
    - Hospitalization rate trend: are hospitalizations rising, stable, or falling?
    - ICU pressure level: classify as LOW (<30% of peak), MODERATE (30-60%), HIGH (>60%), or UNKNOWN if peak data unavailable
    - Ventilator pressure level: same classification

    IMPORTANT DATA NOTE: Always include this note in your output:
    "Google COVID-19 Open Data was archived November 2024 and covers data through September 2022. This data provides historical epidemiological context and real hospitalization benchmarks for the CareFlow AI pipeline. It is not a real-time live feed."

    If either tool returns an ERROR status, document the error clearly and proceed with whatever data was successfully retrieved. Do not block the pipeline.
  expected_output: |-
    A structured JSON-compatible Google COVID Data Context report containing:
    - fetch_status (SUCCESS, PARTIAL, or FAILED)
    - location_key (the location fetched)
    - data_coverage_note (the mandatory archive notice)
    - epidemiology_summary:
        - date_range (earliest and latest dates available)
        - cumulative_confirmed (integer)
        - cumulative_deceased (integer)
        - cumulative_recovered (integer or null)
        - case_fatality_rate_pct (float)
        - recent_case_trend (INCREASING, STABLE, DECREASING, or UNKNOWN)
        - recent_death_trend (INCREASING, STABLE, DECREASING, or UNKNOWN)
        - records_analyzed (integer)
    - hospitalization_summary:
        - latest_hospitalized_patients (integer or null)
        - latest_icu_patients (integer or null)
        - latest_ventilator_patients (integer or null)
        - peak_hospitalized_patients (integer or null)
        - peak_icu_patients (integer or null)
        - peak_ventilator_patients (integer or null)
        - hospitalization_trend (INCREASING, STABLE, DECREASING, or UNKNOWN)
        - icu_pressure_level (LOW, MODERATE, HIGH, or UNKNOWN)
        - ventilator_pressure_level (LOW, MODERATE, HIGH, or UNKNOWN)
    - careflow_context_for_downstream_agents (2-3 sentence plain-language summary of what this real data means for hospital operations planning)
    - fetch_timestamp (ISO timestamp)
  agent: google_covid_live_data_fetching_specialist
ingest_and_validate_hospital_covid_operational_data:
  description: |-
    Validate the available data sources for this pipeline run and produce a structured data foundation report.

    DATA SOURCE PRIORITY:
    This pipeline supports two data modes. Always attempt Mode A first, then fall back to Mode B.

    MODE A — Patient-Level CSV (if {data_file_path} is a valid, accessible file path):
    Use the FileReadTool to read {data_file_path}. If successful, perform:
    1. SCHEMA VALIDATION: Check for fields: patient_id, age, gender, ward, admission_date, oxygen_saturation, respiratory_rate, comorbidity_count, symptom_severity_score, lab_crp, lab_dimer, lung_involvement_pct, icu_admitted, ventilator_required, oxygen_required, discharge_status, region, hospital_id.
    2. MISSING VALUE ANALYSIS: Flag fields >10% missing as HIGH_CONCERN. Flag critical fields (oxygen_saturation, respiratory_rate, age) >20% missing as CRITICAL.
    3. OUTLIER DETECTION: Flag oxygen_saturation outside 50-100, respiratory_rate outside 5-60, age outside 0-120.
    4. DUPLICATE DETECTION: Check for duplicate patient_id values.
    5. Set ingestion_status = SUCCESS or SUCCESS_WITH_WARNINGS and data_mode = PATIENT_LEVEL_CSV.

    MODE B — Google COVID Open Data (when no valid file is provided or file is not accessible):
    Use the Google COVID data already fetched by the live data agent in your context. Do NOT attempt to read any file.
    Produce the data foundation report from the Google COVID epidemiology and hospitalization data:
    - total_records = records_analyzed from the Google COVID epidemiology summary
    - available_fields_for_downstream = ["date", "new_confirmed", "new_deceased", "cumulative_confirmed", "cumulative_deceased", "current_hospitalized_patients", "current_intensive_care_patients", "current_ventilator_patients"]
    - data_quality_score = 92.0 (Google COVID Open Data is a curated public dataset)
    - ingestion_status = SUCCESS_GOOGLE_COVID_MODE
    - data_mode = GOOGLE_COVID_POPULATION_DATA
    - notes = "No patient-level CSV provided. Pipeline running on Google COVID Open Data population benchmarks. Patient-level risk scoring will use population-level inference instead of individual records."

    IMPORTANT: If the file path is empty, missing, a placeholder like 'data_file_path', or the FileReadTool returns an error — immediately switch to MODE B. Do not retry the file. Do not report FAILED. Proceed with Google COVID data.
  expected_output: |-
    A structured JSON-compatible data foundation report containing:
    - data_mode (PATIENT_LEVEL_CSV or GOOGLE_COVID_POPULATION_DATA)
    - ingestion_status (SUCCESS, SUCCESS_WITH_WARNINGS, SUCCESS_GOOGLE_COVID_MODE, or FAILED)
    - total_records (integer — patient count if CSV, or epidemiology records count if Google COVID mode)
    - valid_records (integer)
    - flagged_records (integer, 0 if Google COVID mode)
    - data_quality_score (float 0-100)
    - available_fields_for_downstream (list of confirmed available field names)
    - field_availability (map of field name to availability status — use Google COVID fields if in Mode B)
    - critical_warnings (list of warning strings, empty if data is clean)
    - data_source_description (one sentence describing what data source was used)
    - notes (any important limitations or observations for downstream agents)
  agent: hospital_data_ingestion_validation_specialist
  context:
  - fetch_live_google_covid_epidemiology_and_hospitalization_data
gpu_accelerated_hospital_operations_analytics_and_eda:
  description: |-
    Perform comprehensive operational analytics on the hospital COVID dataset. Your first step is to determine the data mode from the ingestion task output.

    --- CHECK DATA MODE ---
    Read the ingestion task output. If data_mode = "GOOGLE_COVID_POPULATION_DATA", follow MODE B. Otherwise follow MODE A.

    === MODE A: PATIENT_CSV (individual patient records available) ===
    Use the OperationalAnalyticsTool on {data_file_path} with capacity params:
    total_icu_capacity={total_icu_capacity} (default 50), total_ventilators={total_ventilators} (default 20), total_bed_capacity={total_bed_capacity} (default 200).

    Produce all 11 analytical sections from the tool output:
    1. patient_volume, 2. severity_distribution, 3. icu_load, 4. ventilator_utilization,
    5. oxygen_demand, 6. bed_occupancy, 7. regional_trends, 8. comorbidity_distribution,
    9. age_group_distribution, 10. temporal_trend, 11. top_pressure_indicators.

    Add google_covid_data_context benchmarking from the live data fetch task.
    Add gpu_acceleration_notes for production cuDF equivalents.

    === MODE B: GOOGLE_COVID_POPULATION_DATA (no patient CSV — Google COVID data only) ===
    STRICT RULE: Only analyze fields confirmed present in the ingestion task field_availability. Do NOT fabricate ward names, region names, age distributions, comorbidity counts, or oxygen saturation breakdowns — these fields do not exist in Google COVID data.

    Available fields will be a subset of: date, new_confirmed, new_deceased, cumulative_confirmed, cumulative_deceased, current_hospitalized_patients, current_intensive_care_patients, current_ventilator_patients.

    From the Google COVID hospitalization records (passed via ingestion context), compute ONLY what the real data supports:

    1. patient_volume:
       - total_active = latest current_hospitalized_patients value
       - Use date-sorted records to compute new_admissions_24h = latest new_confirmed value
       - Compute 7-day new_confirmed sum for new_admissions_7d
       - trend_direction: compare latest 7-day new_confirmed average vs prior 7 days

    2. icu_load:
       - icu_patient_count = latest current_intensive_care_patients
       - total_icu_capacity = {total_icu_capacity} (default 50)
       - occupancy_pct = icu_patient_count / total_icu_capacity * 100
       - status = NORMAL if <70%, ELEVATED if 70-90%, CRITICAL if >90%

    3. ventilator_utilization:
       - ventilator_patient_count = latest current_ventilator_patients (null if unavailable)
       - total_ventilators = {total_ventilators} (default 20)
       - utilization_pct = if data available, else mark as UNKNOWN

    4. bed_occupancy:
       - total_admitted = latest current_hospitalized_patients
       - total_capacity = {total_bed_capacity} (default 200)
       - occupancy_pct = total_admitted / total_capacity * 100
       - ward_breakdown = [] with note "Ward-level data unavailable in Google COVID dataset"

    5. temporal_trend:
       - Use new_confirmed daily values from the records to compute trend direction
       - Show last 7 days of daily new_confirmed counts
       - Compute 3-day rolling comparison to determine INCREASING / STABLE / DECREASING

    6. top_pressure_indicators:
       - Derive from ICU occupancy %, bed occupancy %, and ventilator utilization only
       - Do NOT invent regional or ward-level pressure indicators

    7. severity_distribution: Set to null with note "Oxygen saturation data not available in Google COVID dataset — requires patient-level CSV"
    8. regional_trends: Set to null with note "Regional breakdown not available in Google COVID dataset"
    9. comorbidity_distribution: Set to null with note "Comorbidity data not available in Google COVID dataset"
    10. age_group_distribution: Set to null with note "Age data not available in Google COVID dataset"
    11. oxygen_demand: Estimate from current_hospitalized_patients assuming ~30% require supplemental oxygen based on COVID hospitalization literature, clearly marked as ESTIMATED

    google_covid_data_context: Add benchmarking note comparing current ICU/bed load to peak values from the live data fetch task.
    gpu_acceleration_notes: List cuDF production equivalents for all operations performed.
  expected_output: 'A structured JSON-compatible analytics summary. In MODE A: all
    11 sections fully populated from real patient data. In MODE B: only sections computable
    from Google COVID fields are populated with real values; all other sections explicitly
    set to null with a data_unavailable_reason string. Must always include: data_mode,
    patient_volume, icu_load, ventilator_utilization, bed_occupancy, temporal_trend,
    top_pressure_indicators, google_covid_data_context, gpu_acceleration_notes, analytics_timestamp.
    Must NEVER fabricate ward names, region names, age distributions, or comorbidity
    data when in MODE B.'
  agent: gpu_accelerated_hospital_operations_analytics_engineer
  context:
  - ingest_and_validate_hospital_covid_operational_data
  - fetch_live_google_covid_epidemiology_and_hospitalization_data
patient_risk_scoring_and_severity_classification:
  description: |-
    Score and classify patients using the CareFlow Risk Scoring Model. The scoring mode depends on the data_mode reported by the ingestion task.

    CHECK DATA MODE FROM INGESTION TASK:

    --- MODE A: PATIENT_LEVEL_CSV ---
    If data_mode is PATIENT_LEVEL_CSV, individual patient records are available.
    Apply the CareFlow Risk Scoring Model to each patient record using these dimensions:

    1. OXYGEN SATURATION (0-30 pts): >94=0, 90-94=10, 85-90=20, <85=30
    2. RESPIRATORY RATE (0-20 pts): <20=0, 20-25=8, 25-30=14, >30=20
    3. AGE (0-15 pts): <40=0, 40-60=5, 60-75=10, >75=15
    4. COMORBIDITIES (0-15 pts): 0=0, 1=5, 2=10, 3+=15
    5. LUNG INVOLVEMENT (0-10 pts): <25%=0, 25-50%=4, 50-75%=7, >75%=10
    6. LAB MARKERS (0-10 pts): CRP>100 adds 5pts, D-dimer>1.0 adds 5pts

    Tiers: 0-25=LOW_RISK | 26-50=MODERATE_RISK | 51-75=HIGH_RISK | 76-100=CRITICAL

    Produce per-patient scores with explanations and a full population summary.

    --- MODE B: GOOGLE_COVID_POPULATION_DATA ---
    If data_mode is GOOGLE_COVID_POPULATION_DATA (no patient CSV available), perform population-level risk inference using the Google COVID hospitalization data from context:

    Use the hospitalization benchmarks:
    - current_intensive_care_patients → infer CRITICAL tier proportion
    - current_hospitalized_patients → infer total active caseload
    - current_ventilator_patients → infer CRITICAL/HIGH tier proportion
    - hospitalization_trend → determines trajectory

    Apply the following population inference model:
    - CRITICAL tier = (current_intensive_care_patients / current_hospitalized_patients) × 100 → percentage
    - HIGH_RISK tier = approximately 2× the CRITICAL percentage (patients approaching ICU threshold)
    - MODERATE_RISK tier = approximately 35% of hospitalized (standard ward patients)
    - LOW_RISK tier = remainder

    Set scoring_mode = POPULATION_INFERENCE and clearly note that individual patient IDs are not available.
    Produce population_summary with estimated counts and percentages.
    State clearly that this is a population-level estimate, not individual patient scoring.

    SAFETY DISCLAIMER (both modes): These operational risk scores are decision support tools only. All clinical decisions must be made by licensed healthcare professionals.
  expected_output: |-
    A structured JSON-compatible risk scoring report containing:
    - scoring_model_version ("CareFlow-RSM-v1.0")
    - scoring_mode (INDIVIDUAL_PATIENT or POPULATION_INFERENCE)
    - data_mode_used (from ingestion task — PATIENT_LEVEL_CSV or GOOGLE_COVID_POPULATION_DATA)
    - population_summary (total_scored or total_estimated, count and percentage per tier: LOW_RISK, MODERATE_RISK, HIGH_RISK, CRITICAL)
    - patient_scores (list of individual scores if Mode A; empty list with explanation note if Mode B)
    - top_critical_patients (top 10 individual patients if Mode A; empty with note if Mode B)
    - top_high_risk_patients (top 20 if Mode A; empty with note if Mode B)
    - population_inference_basis (explanation of how population estimates were derived — only for Mode B)
    - missing_data_impact (description of data limitations)
    - safety_disclaimer ("These operational risk scores are decision support tools only. All clinical decisions must be made by licensed healthcare professionals.")
    - scoring_timestamp (ISO timestamp)
  agent: clinical_operations_patient_risk_scoring_specialist
  context:
  - ingest_and_validate_hospital_covid_operational_data
  - gpu_accelerated_hospital_operations_analytics_and_eda
near_term_hospital_resource_demand_forecasting:
  description: |-
    Using the analytics summary and risk scoring outputs from previous tasks, generate near-term operational demand forecasts for all critical hospital resources.

    Apply the following CAREFLOW FORECASTING METHODOLOGY:

    INPUTS TO USE:
    - Current ICU occupancy percentage from analytics task
    - Current bed occupancy percentage from analytics task
    - Current ventilator utilization from analytics task
    - Current oxygen demand count from analytics task
    - Risk tier distribution from risk scoring task (specifically the count of CRITICAL and HIGH_RISK patients)
    - Temporal trend direction from analytics task (INCREASING, STABLE, or DECREASING)
    - REAL BENCHMARKS from Google COVID Open Data (if available): use peak_icu_patients, peak_hospitalized_patients, and peak_ventilator_patients as historical surge benchmarks to calibrate forecast confidence and ceiling estimates

    GOOGLE COVID DATA CALIBRATION:
    If the live data fetch task returned hospitalization data, use it to:
    - Set a realistic surge ceiling: peak_icu_patients from real data represents a historically observed maximum
    - Adjust confidence levels: if current ICU load is approaching historical peak, raise confidence of CRITICAL forecast
    - Add a google_data_calibration note to each forecast dimension explaining how real data influenced the estimate

    FORECASTING LOGIC:

    1. BED DEMAND FORECAST (next 24h, 48h, 72h):
       - Baseline: current occupancy rate
       - Apply trend multiplier: INCREASING adds 8-12% per day, STABLE adds 2-4%, DECREASING subtracts 3-5%
       - Report forecasted bed count needed and whether capacity will be breached

    2. ICU DEMAND FORECAST (next 24h, 48h, 72h):
       - Baseline: current ICU patients + expected escalations
       - Expected escalations = HIGH_RISK patient count x 0.15 escalation probability per day
       - Apply trend multiplier from temporal trend
       - Flag if forecasted ICU demand exceeds 80% of capacity (ELEVATED) or 95% (CRITICAL)
       - If Google COVID peak ICU data available: note what % of historical peak the forecast represents

    3. VENTILATOR DEMAND FORECAST (next 24h, 48h, 72h):
       - Baseline: current ventilator patients + expected new requirements
       - Expected new requirements = CRITICAL patient count x 0.25 per day
       - Flag if demand approaches total ventilator availability

    4. OXYGEN DEMAND FORECAST (next 24h, 48h):
       - Baseline: current oxygen patients x average oxygen consumption rate (assume 10 cylinders per high-flow patient per day)
       - Apply trend multiplier

    5. DAILY ADMISSIONS FORECAST (next 3 days):
       - Baseline: average daily admissions from temporal data
       - Apply trend multiplier

    Identify the TOP RESOURCE RISK: which resource is most likely to face a shortage in the next 72 hours.
  expected_output: |-
    A structured JSON-compatible forecast report containing:
    - forecast_generated_at (ISO timestamp)
    - forecast_horizon (string: "72 hours")
    - trend_basis (the temporal trend direction used: INCREASING, STABLE, or DECREASING)
    - google_data_calibration_applied (boolean — true if Google COVID benchmark data was used)
    - bed_demand_forecast (current_occupancy_pct, forecast_24h_beds_needed, forecast_48h_beds_needed, forecast_72h_beds_needed, capacity_breach_risk, confidence_level, assumptions list, google_data_calibration note if applicable)
    - icu_demand_forecast (current_icu_count, forecast_24h, forecast_48h, forecast_72h, capacity_breach_threshold_pct, breach_risk_level, confidence_level, assumptions list, google_data_calibration note if applicable)
    - ventilator_demand_forecast (current_ventilator_count, forecast_24h, forecast_48h, forecast_72h, shortage_risk, confidence_level, assumptions list)
    - oxygen_demand_forecast (current_oxygen_patients, forecast_cylinders_24h, forecast_cylinders_48h, shortage_risk, confidence_level, assumptions list)
    - daily_admissions_forecast (baseline_daily_admissions, forecast_day1, forecast_day2, forecast_day3, confidence_level)
    - top_resource_risk (resource_name, risk_level as LOW or MEDIUM or HIGH or CRITICAL, description, recommended_action)
    - forecast_limitations (list of strings describing what could cause forecast to be inaccurate)
    - safety_disclaimer (string: "Forecasts are operational planning tools only. Clinical decisions must be made by licensed healthcare professionals.")
  agent: hospital_resource_demand_forecasting_analyst
  context:
  - gpu_accelerated_hospital_operations_analytics_and_eda
  - patient_risk_scoring_and_severity_classification
  - fetch_live_google_covid_epidemiology_and_hospitalization_data
operational_resource_allocation_recommendations:
  description: |-
    Generate operational resource allocation recommendations using the risk scores and demand forecasts from previous tasks.

    CHECK SCORING MODE FROM RISK SCORING TASK:

    --- MODE A: INDIVIDUAL_PATIENT (patient CSV was available) ---
    Assign one allocation category per patient using this logic:
    1. Score >90 AND SpO2 <80: EMERGENCY_ESCALATION
    2. Score 76-100 AND SpO2 <85 AND RR >30: VENTILATOR_REVIEW
    3. Score 76-100: ICU_REVIEW
    4. Score 51-75 AND oxygen_required=true: OXYGEN_BED
    5. Score 51-75: ICU_REVIEW
    6. Score 26-50 AND oxygen_required=true: OXYGEN_BED
    7. Score 26-50: GENERAL_WARD
    8. Score 0-25 with comorbidities >0: ISOLATION_WARD
    9. Score 0-25: HOME_ISOLATION

    Produce full patient_allocations list, priority_queue, and allocation_summary counts.

    --- MODE B: POPULATION_INFERENCE (Google COVID data only, no individual patients) ---
    Individual patient allocation is not possible without patient records. Instead, produce:
    - allocation_summary with ESTIMATED counts per category, derived from the population_summary tier counts:
      * EMERGENCY_ESCALATION: ~5% of CRITICAL tier
      * VENTILATOR_REVIEW: ~20% of CRITICAL tier
      * ICU_REVIEW: remainder of CRITICAL + HIGH_RISK tier
      * OXYGEN_BED: ~40% of MODERATE_RISK tier
      * GENERAL_WARD: remainder of MODERATE_RISK
      * ISOLATION_WARD: ~30% of LOW_RISK tier
      * HOME_ISOLATION: remainder of LOW_RISK
    - Set patient_allocations = [] and priority_queue = [] with a clear note: "Individual patient allocation requires patient-level CSV data. Provide {data_file_path} to enable individual triage."
    - allocation_mode = POPULATION_ESTIMATED

    HOSPITAL-LEVEL STRATEGY (both modes):
    Using the forecasted demand from the forecasting task, produce:
    - Ward-by-ward capacity recommendations
    - Oxygen procurement recommendation (cylinders needed 24h and 48h)
    - ICU escalation readiness recommendation
    - Ventilator reserve recommendation
    - Top 3 operational bottlenecks with recommended actions

    IMPORTANT: All recommendations are operational guidance only. Final clinical decisions must be made by licensed healthcare professionals.
  expected_output: |-
    A structured JSON-compatible resource allocation report containing:
    - allocation_mode (INDIVIDUAL_PATIENT or POPULATION_ESTIMATED)
    - allocation_summary (count per category: HOME_ISOLATION, ISOLATION_WARD, GENERAL_WARD, OXYGEN_BED, ICU_REVIEW, VENTILATOR_REVIEW, EMERGENCY_ESCALATION — actual counts if Mode A, estimated if Mode B)
    - patient_allocations (full list if Mode A; empty list with note if Mode B)
    - priority_queue (ordered from most urgent if Mode A; empty with note if Mode B)
    - hospital_strategy (ward_capacity_recommendations, oxygen_procurement_recommendation, icu_readiness_recommendation, ventilator_reserve_recommendation)
    - operational_bottlenecks (top 3 with name, severity, recommended_action)
    - allocation_assumptions (list of assumption strings)
    - safety_disclaimer ("All allocation recommendations are operational planning guidance only. Final patient placement and all clinical decisions must be made by licensed healthcare professionals.")
  agent: hospital_operational_resource_allocation_strategist
  context:
  - patient_risk_scoring_and_severity_classification
  - near_term_hospital_resource_demand_forecasting
gemini_decision_intelligence_briefing_for_hospital_administrators:
  description: |-
    Using ALL outputs from the previous tasks (data quality report, analytics summary, risk scoring results, demand forecasts, and resource allocation recommendations), generate a clear, grounded, natural-language operational intelligence briefing for hospital administrators.

    STRICT GROUNDING RULE: Every statement you make must be directly supported by data from the previous agent outputs. Do not introduce any facts, statistics, or clinical claims that are not present in the upstream outputs. If data is missing or uncertain, say so explicitly.

    Generate responses to the following KEY ADMINISTRATOR QUESTIONS using only the grounded data available:

    QUESTION 1 - PATIENT URGENCY:
    "Which patients need urgent operational review right now?"
    Answer: List patients from the EMERGENCY_ESCALATION and VENTILATOR_REVIEW categories from the allocation task. Explain what operational indicators drove their prioritization. State this is operational prioritization, not clinical diagnosis.

    QUESTION 2 - RESOURCE PRESSURE:
    "Which resources are currently under the most pressure?"
    Answer: Identify the top 2-3 resources under pressure using the analytics occupancy data and forecast shortage risks. Quantify the pressure (e.g., "ICU is at X% occupancy with forecast to reach Y% in 48h").

    QUESTION 3 - TODAY'S PRIORITIES:
    "What should administrators prioritize operationally today?"
    Answer: Translate the top operational bottlenecks and forecast risks into 3-5 concrete operational actions administrators can take today. These must be operational actions (staffing, procurement, bed management) not clinical decisions.

    QUESTION 4 - TREND ALERT:
    "Is the situation getting better or worse?"
    Answer: Based on temporal trend and forecast direction, characterize the trajectory. Be honest about confidence levels.

    QUESTION 5 - DATA CONFIDENCE:
    "How reliable is this analysis?"
    Answer: Summarize data quality score and any critical warnings from the ingestion task. Be transparent about limitations.

    Format each answer as a clearly labeled section. Use plain language suitable for a hospital administrator (not a data scientist). Be direct and action-oriented. Include the safety disclaimer prominently.
  expected_output: |-
    A structured operational intelligence briefing document containing:
    - briefing_title (string: "CareFlow AI Operational Intelligence Briefing")
    - generated_at (ISO timestamp)
    - hospital_id (from input data if available)
    - urgency_level (overall operational urgency: ROUTINE, ELEVATED, HIGH, or CRITICAL, derived from the data)
    - patient_urgency_section (grounded answer to Question 1 with list of urgent patients, their key indicators, and the operational basis for prioritization)
    - resource_pressure_section (grounded answer to Question 2 with specific resource names, current utilization percentages, and forecast risk levels)
    - todays_priorities_section (grounded answer to Question 3 with 3 to 5 numbered concrete operational actions)
    - trend_alert_section (grounded answer to Question 4 with trajectory assessment and confidence level)
    - data_confidence_section (grounded answer to Question 5 with data quality score and key limitations)
    - key_metrics_snapshot (quick reference object with: total_patients, critical_count, high_risk_count, icu_occupancy_pct, ventilator_utilization_pct, bed_occupancy_pct, top_resource_at_risk)
    - safety_disclaimer (prominent string: "IMPORTANT: This briefing is an operational decision support tool generated by CareFlow AI. It does not constitute medical advice, clinical diagnosis, or treatment recommendations. All final clinical and patient care decisions must be made by licensed healthcare professionals who have directly assessed each patient. CareFlow AI supports administrators and operations teams only.")
  agent: gemini_powered_hospital_decision_intelligence_communicator
  context:
  - gpu_accelerated_hospital_operations_analytics_and_eda
  - patient_risk_scoring_and_severity_classification
  - near_term_hospital_resource_demand_forecasting
  - operational_resource_allocation_recommendations
executive_operations_report_compilation:
  description: |-
    Synthesize all outputs from every previous task into a single, comprehensive, professionally structured executive operations report. This report will be presented to hospital leadership, government health officers, and district medical officers.

    The report must be clear, concise, and action-oriented. Lead with the most critical findings. Structure it for busy executives who need to act quickly.

    REPORT STRUCTURE:

    SECTION 1 - EXECUTIVE SUMMARY (3-5 sentences maximum):
    State the most critical operational finding, overall system status, and the single most important action required. Use plain language.

    SECTION 2 - DATA FOUNDATION:
    Report date and time, data source used, total records analyzed, data quality score, and any critical data warnings. Be transparent about data limitations.

    SECTION 3 - PATIENT RISK DISTRIBUTION:
    Summary table showing count and percentage of patients in each risk tier. Highlight any unusual concentration in HIGH_RISK or CRITICAL tiers.

    SECTION 4 - PRIORITY PATIENT OPERATIONAL QUEUE:
    List the top patients requiring immediate operational attention (EMERGENCY_ESCALATION and VENTILATOR_REVIEW categories). For each: patient_id, risk score, allocation category, and the key indicators that drove prioritization. Maximum 15 patients.

    SECTION 5 - RESOURCE UTILIZATION STATUS:
    Current utilization for: ICU beds, general ward beds, ventilators, oxygen supply. For each: current value, capacity, utilization percentage, and status (NORMAL, ELEVATED, or CRITICAL).

    SECTION 6 - 72-HOUR DEMAND FORECAST:
    Key forecast numbers for beds, ICU, ventilators, and oxygen. Highlight any resources forecasted to exceed safe thresholds. Include confidence level.

    SECTION 7 - RECOMMENDED OPERATIONAL ACTIONS:
    3-7 numbered, concrete operational actions for administrators to take. Prioritize by urgency. Each action should be specific and actionable (e.g., "Procure X additional oxygen cylinders from supplier by 18:00 today", "Activate surge ICU capacity protocol for Y additional ICU beds").

    SECTION 8 - HOSPITAL-LEVEL OPERATIONAL STRATEGY:
    Ward management recommendations, staffing implications, procurement actions, and escalation readiness from the allocation task hospital strategy.

    SECTION 9 - MANDATORY SAFETY DISCLAIMER:
    Include the full safety disclaimer prominently. This section must never be omitted.
  expected_output: |-
    A complete, professionally structured executive operations report in clean markdown format containing all 9 sections as described. The report must:
    - Begin with report metadata (title, hospital, date, generated by CareFlow AI)
    - Include all 9 sections with clear headings
    - Use tables where appropriate for data presentation
    - Be written in plain language suitable for hospital executives and government health officers
    - Include specific numbers and percentages drawn from upstream agent outputs
    - Close with the full mandatory safety disclaimer: "MANDATORY DISCLAIMER: This report is generated by CareFlow AI as an operational decision support tool for hospital administrators and operations teams. It does not constitute medical advice, clinical diagnosis, or treatment recommendations. CareFlow AI analyzes operational data to support administrative planning and resource management decisions. All final patient care decisions, clinical assessments, treatment plans, and medical orders must be made exclusively by licensed and qualified healthcare professionals who have directly evaluated each patient. Hospital leadership and administrators must apply professional judgment when acting on this report. CareFlow AI is a decision support system only."
    - Be immediately presentable to hospital leadership without further editing
  agent: hospital_operations_executive_report_compiler
  context:
  - ingest_and_validate_hospital_covid_operational_data
  - gpu_accelerated_hospital_operations_analytics_and_eda
  - patient_risk_scoring_and_severity_classification
  - near_term_hospital_resource_demand_forecasting
  - operational_resource_allocation_recommendations
  - gemini_decision_intelligence_briefing_for_hospital_administrators
careflow_ai_pipeline_supervision_and_final_decision_summary:
  description: |-
    Review all pipeline outputs and produce the final authoritative consolidated decision summary.

    STEP 1 — DETECT PIPELINE DATA MODE:
    Read the data ingestion task output. Identify data_mode:
    - If data_mode = "PATIENT_CSV" or ingestion_status = "SUCCESS" or "SUCCESS_WITH_WARNINGS" → FULL_MODE
    - If data_mode = "GOOGLE_COVID_POPULATION_DATA" → POPULATION_MODE

    STEP 2 — MODE-AWARE VALIDATION CHECKLIST:
    Flag issues as PIPELINE_WARNING only when they are genuine failures, not expected behaviour for the mode.

    FULL_MODE checks:
    1. Ingestion: ingestion_status not FAILED, field_availability present, data_quality_score present ✓
    2. GPU Analytics: all 11 sections present and not null ✓
    3. Risk Scoring: population_summary present, patient_scores non-empty, top_critical_patients non-empty, safety_disclaimer present ✓
    4. Forecasting: all 5 dimensions present, top_resource_risk identified, forecast_limitations present ✓
    5. Allocation: allocation_summary present, priority_queue non-empty, hospital_strategy present, safety_disclaimer present ✓
    6. Gemini Briefing: all 5 sections answered, urgency_level set, key_metrics_snapshot present, safety_disclaimer present ✓
    7. Executive Report: all 9 sections present, safety disclaimer present ✓

    POPULATION_MODE checks (relaxed — these are EXPECTED, NOT warnings):
    1. Ingestion: ingestion_status = "SUCCESS_GOOGLE_COVID_MODE", data_quality_score present ✓
    2. GPU Analytics: data_mode present; sections that are null due to missing fields are EXPECTED — only warn if real computable sections (patient_volume, icu_load, bed_occupancy, temporal_trend) are missing ✓
    3. Risk Scoring: population_summary present, scoring_mode = "POPULATION_INFERENCE", patient_scores = [] is EXPECTED AND CORRECT — do NOT flag as warning ✓
    4. Forecasting: all 5 dimensions present (bed, ICU, ventilator, oxygen cylinders 24h+48h, daily admissions), top_resource_risk identified ✓
       — For oxygen: forecast is valid if EITHER forecast_cylinders_24h OR forecast_cylinders_48h is present — do NOT require both
    5. Allocation: allocation_summary present, hospital_strategy present, safety_disclaimer present; priority_queue = [] is EXPECTED in POPULATION_ESTIMATED mode — do NOT flag as warning ✓
    6. Gemini: urgency_level set, all 5 question sections answered, safety_disclaimer present ✓
    7. Executive Report: all 9 sections present ✓

    STEP 3 — PRODUCE FINAL DECISION SUMMARY:
    Consolidate the most critical operational intelligence into the structured JSON summary.
    For POPULATION_MODE: note that patient-level IDs are not available; use allocation category names as placeholders (not fabricated IDs).
    Set pipeline_status = COMPLETED if no genuine warnings; COMPLETED_WITH_WARNINGS only if real issues found; FAILED only if a critical agent produced no usable output.
  expected_output: |-
    A final authoritative JSON-compatible CareFlow AI Decision Summary containing:
    - pipeline_run_id (unique UUID-style string)
    - pipeline_timestamp (ISO timestamp)
    - pipeline_status (COMPLETED, COMPLETED_WITH_WARNINGS, or FAILED)
    - data_mode (FULL_MODE or POPULATION_MODE)
    - pipeline_warnings (list of genuine issues only — empty list [] if pipeline ran cleanly in its mode)
    - overall_operational_status (ROUTINE, ELEVATED, HIGH, or CRITICAL)
    - hospital_id (from data if available, else null)
    - data_quality_score (float from ingestion agent)
    - total_patients_analyzed (integer — real hospitalized count in POPULATION_MODE)
    - risk_distribution (low_risk, moderate_risk, high_risk, critical counts)
    - immediate_action_required (boolean)
    - emergency_escalation_patients (list of patient IDs in FULL_MODE; ["POPULATION_MODE: see allocation_summary counts"] in POPULATION_MODE)
    - ventilator_review_patients (same pattern)
    - icu_review_patients (top 10 in FULL_MODE; estimated count in POPULATION_MODE)
    - resource_status (icu, ventilators, oxygen, beds — each with utilization_pct and status)
    - top_resource_at_risk (single resource name)
    - forecast_72h_summary (one sentence per resource)
    - top_3_operational_actions (3 concrete actions)
    - gemini_briefing_urgency_level
    - executive_report_available (true)
    - safety_disclaimer (mandatory)
    - pipeline_metadata (version, model, processing_notes including data_mode explanation)
  agent: careflow_ai_supervisor_orchestration_controller
  context:
  - ingest_and_validate_hospital_covid_operational_data
  - gpu_accelerated_hospital_operations_analytics_and_eda
  - patient_risk_scoring_and_severity_classification
  - near_term_hospital_resource_demand_forecasting
  - operational_resource_allocation_recommendations
  - gemini_decision_intelligence_briefing_for_hospital_administrators
  - executive_operations_report_compilation
